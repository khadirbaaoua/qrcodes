<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Audio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .player {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }
    button {
      margin-top: 15px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    audio {
      width: 100%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="player">
  <h2>🎧 Audio</h2>

  <button onclick="playAudio()">▶️ Lancer le son</button>

  <audio id="audio" controls>
    <source src="https://drive.google.com/uc?export=open&id=1ibZAdLumceO0Cf3iCkGSSszX1W0TgRIW" type="audio/mpeg">
  </audio>
</div>

<script>
  function playAudio() {
    const audio = document.getElementById('audio');
    audio.play();
  }
</script>

</body>
</html>
